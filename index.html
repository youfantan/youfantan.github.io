    <script type="text/javascript">
    var repository_num=0;
    var repository_names=[];
    var followers_num=0;
    var random=0;
    var ifgot=false;
    var origincontent;
    var content=document.getElementById('content')
    $(document).ready(function () {
        $("#sel").formSelect();
        $('.tabs').tabs();
        $('.tooltipped').tooltip();
        $("#content").load("/html/ZhihuAnswerArchive.html")
        loadlive2d("live2d", "chino/model.json");
        $("#live2d").click(function(){
            random=Math.floor(Math.random()*8);
            if(random==0){
                M.toast({html:'你在干什么啊！'});
            } else if(random==1){
                M.toast({html:'别碰人家啦！'});
            } else if(random==2){
                M.toast({html:'再碰人家，人家就报警了！'});
            } else if(random==3){
                M.toast({html:'是…是不小心碰到了吧'});
            } else if(random==4){
                M.toast({html:'干嘛呢你，快把手拿开！'});
            } else if(random==5){
                M.toast({html:'鼠…鼠标放错地方了！'});
            } else if(random==6){
                M.toast({html:'110吗，这里有个变态一直在摸我(ó﹏ò｡)'})
            } else if(random==7){
                M.toast({html:'年轻人耗耗反思，耗子尾汁，不要再犯这样的小聪明，不要搞 窝里斗'})
            }
        })
        $('#zhihuans').click(function(){
            $("#content").load("/html/ZhihuAnswerArchive.html")
        })
        $('#documents').click(function(){
            $("#content").load("/html/Articles.html")
        })
        $('#project').click(function(){
            $("#content").load("/html/Projects.html")
        })
        $('#gh-repositories').click(function(){
            if(ifgot==false){
                $("#content").load("/html/Loading.html")
                gh_inf();
            } else{
                content.innerHTML=origincontent;
            }
        })
    })
    function gh_inf(){
        var xhr=new XMLHttpRequest();
        var response;
        xhr.open('GET','https://api.github.com/users/youfantan',true);
        xhr.setRequestHeader('Authorization','cfd705c4b23567c5fff990d014402104a7ac9658')
        xhr.send();
        xhr.onreadystatechange=function(){
            if(xhr.readyState==4 && xhr.status==200){
            response=xhr.responseText;
            var response_obj=JSON.parse(response);
            var repo_url=response_obj.repos_url;
            followers_num=response_obj.followers;
            var repos;
            var repo_url_xhr=new XMLHttpRequest();
            repo_url_xhr.open('GET',repo_url,true);
            repo_url_xhr.send();
            repo_url_xhr.onreadystatechange=function(){
                if(repo_url_xhr.readyState==4&&repo_url_xhr.status==200){
                content.innerHTML="";
                repos=repo_url_xhr.responseText;
                var repos_obj=JSON.parse(repos);
                var repo_obj;
                for(var i=0;i<repos_obj.length;i++){
                    repo_obj=repos_obj[i];
                    repository_names.push(repo_obj.name)
                }
                content.innerHTML="";
                for(var a=0;a<repository_names.length;a++){
                        origincontent=content.innerHTML;
                        content.innerHTML=origincontent+"<div class=\"card blue lighten-5\"><div class=\"card-content\"><div class=\"card-title\"youfantan/>"+repository_names[a]+"</div>"+"<img src=\"https://badgen.net/github/stars/youfantan/"+repository_names[a]+"\"/>"+"<img src=\"https://badgen.net/github/commits/youfantan/"+repository_names[a]+"\"/>"+"<img src=\"https://badgen.net/github/last-commit/youfantan/"+repository_names[a]+"\"/>"+"<img src=\"https://badgen.net/github/license/youfantan/"+repository_names[a]+"\"/>"+"</div><div class=\"card-action\"><a class=\"btn grey darken-2 waves-effect\" href=\"https://github.com/youfantan/"+repository_names[a]+"\">View In Github</a></div>"
                }
                ifgot=true;
            }
            }
        }
        }
    }
